name: CI

on:
  workflow_dispatch:

permissions: read-all

env:
  CI: true

jobs:
  test-and-local-build:
    name: Test, install Android SDK, local Android build and upload artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Restore Android SDK subdirs cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/android-sdk/cmdline-tools
            ${{ runner.temp }}/android-sdk/platforms
            ${{ runner.temp }}/android-sdk/build-tools
            ${{ runner.temp }}/android-sdk/platform-tools
          key: android-sdk-${{ runner.os }}-v1
          restore-keys: |
            android-sdk-${{ runner.os }}-

      - name: Install Android SDK command-line tools (if needed)
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip wget lib32stdc++6 lib32z1
          export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}
          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          if [ -d "$ANDROID_SDK_ROOT/platform-tools" ] && [ -d "$ANDROID_SDK_ROOT/cmdline-tools/latest" ] && [ -d "$ANDROID_SDK_ROOT/platforms/android-33" ] && [ -d "$ANDROID_SDK_ROOT/build-tools/33.0.2" ]; then
            echo "Android SDK components already present in cache, skipping download.";
          else
            cd "$ANDROID_SDK_ROOT/cmdline-tools"
            curl -fSL "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip" -o cmdline-tools.zip
            unzip -q cmdline-tools.zip
            if [ -d cmdline-tools ]; then
              mv cmdline-tools latest || true
            else
              mkdir -p latest
              mv * latest 2>/dev/null || true
            fi
            export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
            yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
            sdkmanager --sdk_root="$ANDROID_SDK_ROOT" "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          fi

      - name: Save Android SDK subdirs to cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/android-sdk/cmdline-tools
            ${{ runner.temp }}/android-sdk/platforms
            ${{ runner.temp }}/android-sdk/build-tools
            ${{ runner.temp }}/android-sdk/platform-tools
          key: android-sdk-${{ runner.os }}-v1

      - name: Show sdkmanager info
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
        run: |
          export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          sdkmanager --list --sdk_root="$ANDROID_SDK_ROOT" || true

      - name: Prebuild Android (generate native project)
        run: npx expo prebuild --platform android --non-interactive

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: |
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
          fi

      - name: Build Android release APK (local)
        env:
          ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
          JAVA_HOME: ${{ env.JAVA_HOME }}
          GRADLE_USER_HOME: ${{ runner.temp }}/.gradle
        working-directory: android
        run: |
          set -e
          export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          if [ -f gradlew ]; then
            echo "Starting local Gradle build..."
            ./gradlew assembleRelease || (echo "Gradle build failed"; exit 0)
          else
            echo "No android/gradlew found — skipping Gradle build.";
          fi

      - name: Save Gradle cache
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Upload APK artifact if exists
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/*/*/*.apk
          if-no-files-found: warn

      - name: Upload generated android project (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: android-project
          path: android
          if-no-files-found: warn

      - name: Finish
        run: echo "Workflow finished. Check uploaded artifacts for APKs or the generated android project."