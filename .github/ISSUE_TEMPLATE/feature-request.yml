name: Feature Request / 功能建议
description: Suggest a new feature or improvement / 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你希望的功能以及为什么需要它。
        Thanks for the suggestion! Please describe the feature you'd like and why it's needed.

  - type: textarea
    id: problem
    attributes:
      label: 使用场景 / Problem Statement
      description: 你遇到了什么问题或不便？/ What problem or inconvenience are you experiencing?
      placeholder: |
        例如：我有很多资产需要管理，但目前没有一个批量操作的方式，每次都要逐个点开...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案 / Proposed Solution
      description: 你希望如何解决这个问题？/ How would you like this to be solved?
      placeholder: |
        希望能在资产列表页添加批量选择功能，支持批量删除、批量修改分类...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案 / Alternatives Considered
      description: 有没有其他方式可以达到目的？/ Have you considered alternative approaches?
      placeholder: |
        也可以做一个"全选"按钮，但批量选择更灵活...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级 / Priority
      description: 这个功能对你有多重要？/ How important is this feature to you?
      options:
        - 必须有才能用 / Critical — can't use the app without it
        - 很重要，显著提升体验 / Important — significantly improves experience
        - 锦上添花 / Nice to have
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 补充信息 / Additional Context
      description: 截图、草图、参考 App 等 / Screenshots, mockups, reference apps, etc.
    validations:
      required: false
